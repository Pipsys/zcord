name: Build macOS Client Installer

on:
  workflow_dispatch:
  release:
    types:
      - published
  push:
    branches:
      - main
    paths:
      - "client/**"
      - ".github/workflows/client-macos-installer.yml"

permissions:
  contents: write

jobs:
  build-macos:
    name: macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            arch: x64
          - os: macos-14
            arch: arm64

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build renderer and electron main
        run: npm run build

      - name: Build unsigned DMG
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --mac dmg --${{ matrix.arch }} --publish never --config.directories.output=release-macos-${{ matrix.arch }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rucord-macos-${{ matrix.arch }}
          path: |
            client/release-macos-${{ matrix.arch }}/*.dmg
            client/release-macos-${{ matrix.arch }}/*.zip
            client/release-macos-${{ matrix.arch }}/*.blockmap
          if-no-files-found: error

  publish-release-assets:
    name: Attach macOS installers to GitHub Release
    if: github.event_name == 'release'
    needs:
      - build-macos
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: rucord-macos-*
          path: release-assets
          merge-multiple: true

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            release-assets/*.dmg
            release-assets/*.zip
            release-assets/*.blockmap
          fail_on_unmatched_files: true
