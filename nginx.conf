worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  # Resolve docker service names dynamically to avoid stale container IPs after recreate.
  resolver 127.0.0.11 valid=10s ipv6=off;
  # Allow media uploads (attachments up to ~50 MB, avatars/banners lower on backend validators).
  client_max_body_size 60m;

  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  server {
    listen 80;
    server_name pawcord.ru www.pawcord.ru api.pawcord.ru;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name pawcord.ru www.pawcord.ru api.pawcord.ru;
    client_max_body_size 60m;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location /api/v1/auth/ {
      limit_req zone=auth_limit burst=20 nodelay;
      set $backend_upstream backend:8000;
      proxy_pass http://$backend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    location /ws/ {
      set $backend_upstream backend:8000;
      proxy_pass http://$backend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    location /pawcord-media/ {
      set $minio_upstream minio:9000;
      proxy_pass http://$minio_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    location / {
      limit_req zone=api_limit burst=100 nodelay;
      set $backend_upstream backend:8000;
      proxy_pass http://$backend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }
  }
}
