appId: com.zcord.desktop
productName: zcord
files:
  - dist/**
  - dist-electron/**
  - package.json
asar: true
directories:
  output: release
publish: null
win:
  icon: icon.ico
  target:
    - nsis
  artifactName: "zcord-Setup-${version}.${ext}"
nsis:
  installerIcon: icon.ico
  uninstallerIcon: icon.ico
  installerHeaderIcon: icon.ico
mac:
  target:
    - dmg
linux:
  target:
    - AppImage
